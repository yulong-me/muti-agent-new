<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Piano Teaching App</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      color: #fff;
    }

    .screen {
      display: none;
      flex-direction: column;
      align-items: center;
      padding: 40px;
    }

    .screen.active {
      display: flex;
    }

    /* Start Overlay */
    #start-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.9);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 100;
    }

    #start-overlay.hidden {
      display: none;
    }

    .overlay-content {
      text-align: center;
    }

    .overlay-content h1 {
      font-size: 48px;
      margin-bottom: 30px;
    }

    .btn {
      padding: 15px 40px;
      font-size: 18px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      background: #4CAF50;
      color: white;
      transition: transform 0.2s, background 0.2s;
    }

    .btn:hover {
      background: #45a049;
      transform: scale(1.05);
    }

    /* Song Selection */
    #song-select h2 {
      font-size: 32px;
      margin-bottom: 30px;
    }

    #song-list {
      display: flex;
      flex-direction: column;
      gap: 15px;
      width: 100%;
      max-width: 400px;
    }

    .song-item {
      padding: 20px 30px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      cursor: pointer;
      transition: background 0.2s, transform 0.2s;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .song-item:hover {
      background: rgba(255, 255, 255, 0.2);
      transform: translateX(5px);
    }

    .song-name {
      font-size: 20px;
      font-weight: 500;
    }

    .song-difficulty {
      color: #ffd700;
    }

    /* Practice Screen */
    #practice {
      width: 100%;
      max-width: 900px;
    }

    #header {
      text-align: center;
      margin-bottom: 30px;
    }

    #song-title {
      font-size: 28px;
      margin-bottom: 10px;
    }

    #progress {
      font-size: 18px;
      color: #aaa;
    }

    /* Keyboard */
    #keyboard {
      display: flex;
      position: relative;
      height: 180px;
      margin: 20px 0;
    }

    .white-key {
      width: 48px;
      height: 180px;
      background: linear-gradient(180deg, #fafafa 0%, #e8e8e8 100%);
      border: 1px solid #ccc;
      border-radius: 0 0 6px 6px;
      cursor: pointer;
      transition: background 0.1s;
      position: relative;
      z-index: 1;
    }

    .white-key:hover {
      background: linear-gradient(180deg, #fff 0%, #f0f0f0 100%);
    }

    .white-key.pressed {
      background: linear-gradient(180deg, #e0e0e0 0%, #d0d0d0 100%);
    }

    .black-key {
      width: 28px;
      height: 110px;
      background: linear-gradient(180deg, #333 0%, #111 100%);
      border-radius: 0 0 4px 4px;
      cursor: pointer;
      position: absolute;
      z-index: 2;
      transition: background 0.1s;
    }

    .black-key:hover {
      background: linear-gradient(180deg, #444 0%, #222 100%);
    }

    .black-key.pressed {
      background: linear-gradient(180deg, #222 0%, #000 100%);
    }

    .key.highlighted {
      animation: pulse 0.8s ease-in-out infinite;
    }

    .white-key.highlighted {
      background: linear-gradient(180deg, #00d4ff 0%, #00a8cc 100%);
      box-shadow: 0 0 20px rgba(0, 212, 255, 0.6);
    }

    .black-key.highlighted {
      background: linear-gradient(180deg, #00a8cc 0%, #007a9a 100%);
      box-shadow: 0 0 15px rgba(0, 212, 255, 0.6);
    }

    .key.correct {
      animation: flash-green 0.15s ease-out;
    }

    .key.wrong {
      animation: flash-red 0.15s ease-out;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.02); }
    }

    @keyframes flash-green {
      0% { background: #4CAF50; }
      100% { background: inherit; }
    }

    @keyframes flash-red {
      0% { background: #f44336; }
      100% { background: inherit; }
    }

    .key-label {
      position: absolute;
      bottom: 8px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 11px;
      color: #666;
      pointer-events: none;
    }

    .black-key .key-label {
      color: #888;
      bottom: 6px;
      font-size: 10px;
    }

    /* Back Button */
    #back-btn {
      margin-top: 20px;
      padding: 10px 25px;
      background: transparent;
      border: 1px solid #666;
      color: #aaa;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      transition: all 0.2s;
    }

    #back-btn:hover {
      border-color: #aaa;
      color: #fff;
    }

    /* Complete Overlay */
    #complete-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.85);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 100;
    }

    #complete-overlay.hidden {
      display: none;
    }

    #complete-overlay h2 {
      font-size: 42px;
      margin-bottom: 30px;
    }

    #complete-overlay .btn-group {
      display: flex;
      gap: 15px;
    }

    #complete-overlay .btn {
      padding: 12px 30px;
      font-size: 16px;
    }

    .btn-secondary {
      background: #555;
    }

    .btn-secondary:hover {
      background: #666;
    }
  </style>
</head>
<body>
  <!-- Start Overlay -->
  <div id="start-overlay">
    <div class="overlay-content">
      <h1>🎹 Piano Teaching App</h1>
      <button id="start-btn" class="btn">点击开始</button>
    </div>
  </div>

  <!-- Song Selection Screen -->
  <div id="song-select" class="screen">
    <h2>选择曲目</h2>
    <div id="song-list"></div>
    <button id="back-to-start-btn" class="btn" style="margin-top: 30px; background: #555;">返回</button>
  </div>

  <!-- Practice Screen -->
  <div id="practice" class="screen">
    <div id="header">
      <h2 id="song-title"></h2>
      <div id="progress">进度: <span id="current">0</span> / <span id="total">0</span></div>
    </div>
    <div id="keyboard"></div>
    <button id="back-btn">返回曲目列表</button>
  </div>

  <!-- Completion Overlay -->
  <div id="complete-overlay" class="hidden">
    <h2>🎉 恭喜完成！</h2>
    <div class="btn-group">
      <button id="replay-btn" class="btn">再弹一次</button>
      <button id="choose-song-btn" class="btn btn-secondary">选择其他曲目</button>
    </div>
  </div>

  <script>
    // ==================== Song Library ====================
    const songs = [
      {
        name: "小星星",
        bpm: 120,
        difficulty: "★☆☆",
        notes: [
          {note: 60, duration: 0.5}, {note: 60, duration: 0.5}, {note: 67, duration: 0.5}, {note: 67, duration: 0.5},
          {note: 69, duration: 0.5}, {note: 69, duration: 0.5}, {note: 67, duration: 1},
          {note: 65, duration: 0.5}, {note: 65, duration: 0.5}, {note: 64, duration: 0.5}, {note: 64, duration: 0.5},
          {note: 62, duration: 0.5}, {note: 62, duration: 0.5}, {note: 60, duration: 1}
        ]
      },
      {
        name: "玛丽有只小羊羔",
        bpm: 100,
        difficulty: "★☆☆",
        notes: [
          {note: 64, duration: 0.5}, {note: 62, duration: 0.5}, {note: 60, duration: 0.5}, {note: 62, duration: 0.5},
          {note: 64, duration: 0.5}, {note: 64, duration: 0.5}, {note: 64, duration: 1},
          {note: 62, duration: 0.5}, {note: 62, duration: 0.5}, {note: 64, duration: 1},
          {note: 62, duration: 0.5}, {note: 60, duration: 0.5}, {note: 60, duration: 0.5}, {note: 60, duration: 0.5},
          {note: 62, duration: 0.5}, {note: 60, duration: 1}
        ]
      },
      {
        name: "生日快乐",
        bpm: 110,
        difficulty: "★★☆",
        notes: [
          {note: 60, duration: 0.5}, {note: 60, duration: 0.5}, {note: 62, duration: 1},
          {note: 60, duration: 0.5}, {note: 65, duration: 1}, {note: 64, duration: 1},
          {note: 60, duration: 0.5}, {note: 60, duration: 0.5}, {note: 62, duration: 1},
          {note: 60, duration: 0.5}, {note: 67, duration: 1}, {note: 65, duration: 1},
          {note: 60, duration: 0.5}, {note: 60, duration: 0.5}, {note: 72, duration: 1},
          {note: 69, duration: 0.5}, {note: 65, duration: 0.5}, {note: 64, duration: 0.5}, {note: 62, duration: 0.5},
          {note: 71, duration: 0.5}, {note: 71, duration: 0.5}, {note: 69, duration: 1},
          {note: 65, duration: 0.5}, {note: 65, duration: 0.5}, {note: 64, duration: 0.5}, {note: 62, duration: 0.5},
          {note: 60, duration: 1}
        ]
      }
    ];

    // ==================== Audio Engine ====================
    let audioCtx = null;

    function initAudio() {
      if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      }
      if (audioCtx.state === 'suspended') {
        audioCtx.resume();
      }
    }

    function playNote(midiNote) {
      if (!audioCtx) return;
      const freq = 440 * Math.pow(2, (midiNote - 69) / 12);
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type = 'triangle';
      osc.frequency.value = freq;
      // ADSR envelope
      const now = audioCtx.currentTime;
      gain.gain.setValueAtTime(0, now);
      gain.gain.linearRampToValueAtTime(0.8, now + 0.01);
      gain.gain.linearRampToValueAtTime(0.56, now + 0.11);
      gain.gain.linearRampToValueAtTime(0, now + 0.4);
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      osc.start(now);
      osc.stop(now + 0.4);
    }

    // ==================== Keyboard Layout ====================
    // Computer keyboard to MIDI mapping
    const KEYBOARD_MAP = {
      'a': 48, 'w': 49, 's': 50, 'e': 51, 'd': 52, 'f': 53, 't': 54,
      'g': 55, 'y': 56, 'h': 57, 'u': 58, 'j': 59, 'k': 60, 'o': 61, 'l': 62,
      'p': 63, ';': 64
    };

    // White key indices in an octave: C, D, E, F, G, A, B (0-6)
    // Black key pattern after each white key: C#, D#, -, F#, G#, A#, -
    const BLACK_KEY_PATTERN = [1, 1, 0, 1, 1, 1, 0]; // 1=has black key after, 0=no

    function buildKeyboard() {
      const keyboard = document.getElementById('keyboard');
      keyboard.innerHTML = '';

      const startNote = 48; // C3
      const numOctaves = 2;

      let whiteKeyIndex = 0;
      const whiteKeys = [];

      for (let octave = 0; octave < numOctaves; octave++) {
        const octaveStart = startNote + octave * 12;

        // Create white keys for this octave
        for (let i = 0; i < 7; i++) {
          const midiNote = octaveStart + i;
          const key = document.createElement('div');
          key.className = 'white-key';
          key.dataset.midi = midiNote;

          // Add keyboard label
          const labels = ['C', 'D', 'E', 'F', 'G', 'A', 'B'];
          const label = document.createElement('span');
          label.className = 'key-label';
          label.textContent = labels[i] + (octave + 3);
          key.appendChild(label);

          key.addEventListener('mousedown', () => handleKeyPress(midiNote));
          key.addEventListener('touchstart', (e) => { e.preventDefault(); handleKeyPress(midiNote); });

          keyboard.appendChild(key);
          whiteKeys.push({ element: key, midiNote });
        }

        // Create black keys for this octave (except after last octave's B)
        if (octave < numOctaves - 1 || numOctaves === 1) {
          for (let i = 0; i < 7; i++) {
            if (BLACK_KEY_PATTERN[i]) {
              const midiNote = octaveStart + i + 1; // Black key is +1 from white
              const blackKey = document.createElement('div');
              blackKey.className = 'black-key';

              // Position black key
              const whiteWidth = 48;
              const blackWidth = 28;
              const offset = (whiteWidth - blackWidth) / 2;
              const xPos = (whiteKeyIndex - 1) * whiteWidth + offset + whiteWidth;

              blackKey.style.left = xPos + 'px';
              blackKey.dataset.midi = midiNote;

              const blackLabels = ['C#', 'D#', '', 'F#', 'G#', 'A#', ''];
              if (blackLabels[i]) {
                const label = document.createElement('span');
                label.className = 'key-label';
                label.textContent = blackLabels[i] + (octave + 3);
                blackKey.appendChild(label);
              }

              blackKey.addEventListener('mousedown', () => handleKeyPress(midiNote));
              blackKey.addEventListener('touchstart', (e) => { e.preventDefault(); handleKeyPress(midiNote); });

              keyboard.appendChild(blackKey);
            }
            whiteKeyIndex++;
          }
        }
      }
    }

    // ==================== Game State ====================
    let currentSong = null;
    let currentNoteIndex = 0;
    let isPlaying = false;

    function showScreen(screenId) {
      document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
      document.getElementById(screenId).classList.add('active');
    }

    function selectSong(song) {
      currentSong = song;
      currentNoteIndex = 0;
      isPlaying = true;
      document.getElementById('song-title').textContent = song.name;
      document.getElementById('total').textContent = song.notes.length;
      updateProgress();
      showScreen('practice');
      highlightCurrentNote();
    }

    function updateProgress() {
      document.getElementById('current').textContent = currentNoteIndex;
    }

    function highlightCurrentNote() {
      document.querySelectorAll('.key').forEach(k => k.classList.remove('highlighted'));
      if (currentNoteIndex < currentSong.notes.length) {
        const note = currentSong.notes[currentNoteIndex].note;
        const keyEl = document.querySelector(`[data-midi="${note}"]`);
        if (keyEl) {
          keyEl.classList.add('highlighted');
        }
      }
    }

    function flashKey(midiNote, type) {
      const keyEl = document.querySelector(`[data-midi="${midiNote}"]`);
      if (keyEl) {
        keyEl.classList.remove('highlighted');
        keyEl.classList.add(type);
        setTimeout(() => {
          keyEl.classList.remove(type);
          // Re-add highlight if still current note
          if (type === 'correct' && currentNoteIndex < currentSong.notes.length) {
            const note = currentSong.notes[currentNoteIndex].note;
            if (midiNote === note) {
              keyEl.classList.add('highlighted');
            }
          }
        }, 150);
      }
    }

    function handleKeyPress(midiNote) {
      if (!isPlaying || !currentSong) return;

      const expected = currentSong.notes[currentNoteIndex].note;

      // Visual feedback for pressed key
      const keyEl = document.querySelector(`[data-midi="${midiNote}"]`);
      if (keyEl) {
        keyEl.classList.add('pressed');
        setTimeout(() => keyEl.classList.remove('pressed'), 100);
      }

      if (midiNote === expected) {
        // Correct!
        playNote(midiNote);
        flashKey(midiNote, 'correct');
        currentNoteIndex++;
        updateProgress();

        if (currentNoteIndex >= currentSong.notes.length) {
          completeSong();
        } else {
          highlightCurrentNote();
        }
      } else {
        // Wrong!
        flashKey(midiNote, 'wrong');
      }
    }

    function completeSong() {
      isPlaying = false;
      document.getElementById('complete-overlay').classList.remove('hidden');
    }

    function replaySong() {
      document.getElementById('complete-overlay').classList.add('hidden');
      selectSong(currentSong);
    }

    function showSongSelect() {
      document.getElementById('complete-overlay').classList.add('hidden');
      showScreen('song-select');
    }

    // ==================== Init ====================
    function init() {
      buildKeyboard();

      // Populate song list
      const songList = document.getElementById('song-list');
      songs.forEach(song => {
        const item = document.createElement('div');
        item.className = 'song-item';
        item.innerHTML = `
          <span class="song-name">${song.name}</span>
          <span class="song-difficulty">${song.difficulty}</span>
        `;
        item.addEventListener('click', () => selectSong(song));
        songList.appendChild(item);
      });

      // Start button
      document.getElementById('start-btn').addEventListener('click', () => {
        initAudio();
        document.getElementById('start-overlay').classList.add('hidden');
        showScreen('song-select');
      });

      // Back buttons
      document.getElementById('back-btn').addEventListener('click', showSongSelect);
      document.getElementById('back-to-start-btn').addEventListener('click', () => {
        showScreen('song-select');
      });

      // Complete overlay buttons
      document.getElementById('replay-btn').addEventListener('click', replaySong);
      document.getElementById('choose-song-btn').addEventListener('click', showSongSelect);

      // Computer keyboard input
      document.addEventListener('keydown', (e) => {
        if (e.repeat) return;
        const midiNote = KEYBOARD_MAP[e.key.toLowerCase()];
        if (midiNote !== undefined) {
          handleKeyPress(midiNote);
        }
      });
    }

    document.addEventListener('DOMContentLoaded', init);
  </script>
</body>
</html>
